{% extends "base.html" %}
{% block title %}Login — CyberGuard AI{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow border-0">
      <div class="card-body p-4 p-lg-5">
        <h2 class="mb-1">Welcome back</h2>
        <p class="text-secondary mb-4">Sign in to run predictions and view history.</p>
        <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>
        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" required autocomplete="email">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <p class="mt-3 mb-0 text-center small">No account? <a href="{{ url_for('pages.register') }}">Register</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
if (new URLSearchParams(window.location.search).get('logout')) {
  localStorage.removeItem('access_token');
}
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const alertEl = document.getElementById('loginAlert');
  alertEl.classList.add('d-none');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    localStorage.setItem('access_token', data.token);
    window.location.href = '/dashboard';
  } catch (err) {
    alertEl.textContent = err.message;
    alertEl.classList.remove('d-none');
  }
});
</script>
{% endblock %}
